name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Project Structure
        run: |
          mkdir -p src public
          mv *.tsx *.ts *.css src/ 2>/dev/null || true
          mv index.html public/ 2>/dev/null || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install --force
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build Web Assets
        run: |
          npm run build --if-present || (mkdir -p dist && touch dist/index.html)

      - name: Capacitor Setup
        run: |
          npx cap init "MetaAI Browser" "com.metaai.browser" --web-dir dist --confirm || true
          npx cap add android || true
          npx cap sync android

      - name: Build APK
        run: |
          if [ -d "android" ]; then
            cd android
            chmod +x gradlew
            ./gradlew assembleDebug
          else
            echo "Android folder not found"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MetaAI-Browser-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          

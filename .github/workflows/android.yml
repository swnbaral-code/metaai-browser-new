name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Project Structure
        run: |
          mkdir -p src public
          # Move files into src if they are outside
          mv *.tsx *.ts *.css src/ 2>/dev/null || true
          # Move index.html into public if it's outside
          mv index.html public/ 2>/dev/null || true

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install --force
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build and Sync
        run: |
          npm run build --if-present
          npx cap init "MetaAI Browser" "com.metaai.browser" --web-dir dist --confirm || true
          npx cap add android || true
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: MetaAI-Browser-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          

name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Project Structure
        run: |
          mkdir -p src public dist
          mv *.tsx *.ts *.css src/ 2>/dev/null || true
          mv index.html public/ 2>/dev/null || true
          echo "<html><body>MetaAI Browser Ready</body></html>" > dist/index.html

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: |
          npm install --force
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Capacitor Setup
        run: |
          # Manually creating a valid config to avoid appId error
          echo '{"appId": "com.metaai.browser", "appName": "MetaAI Browser", "webDir": "dist", "bundledWebRuntime": false}' > capacitor.config.json
          npx cap add android || true
          npx cap sync android

      - name: Build APK
        run: |
          if [ -d "android" ]; then
            cd android
            chmod +x gradlew
            ./gradlew assembleDebug
          else
            echo "Android folder missing, creating now..."
            npx cap add android
            cd android
            chmod +x gradlew
            ./gradlew assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MetaAI-Browser-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          

name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: |
          npm install --force
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build Web Project
        run: |
          # ଏହି ଷ୍ଟେପ୍ ଆପଣଙ୍କ ସବୁ କୋଡ୍‌କୁ ଏକାଠି କରିବ
          npm run build --if-present

      - name: Capacitor Sync
        run: |
          # ଡିଫଲ୍ଟ ଭାବେ 'dist' ଫୋଲ୍ଡର ବ୍ୟବହାର ହେବ
          echo '{"appId": "com.metaai.browser", "appName": "MetaAI Browser", "webDir": "dist", "bundledWebRuntime": false}' > capacitor.config.json
          mkdir -p dist
          npx cap add android || true
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MetaAI-Browser-Final-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          

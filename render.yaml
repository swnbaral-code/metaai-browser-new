services:
  - type: web
    name: metaai-browser-backend
    runtime: node
    plan: free
    region: singapore
    branch: main
    buildCommand: npm install && npx tsc -p tsconfig.server.json
    startCommand: node dist/server.js
    envVars:
      - key: GEMINI_API_KEY
        sync: false     
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
    autoDeploy: true
    
